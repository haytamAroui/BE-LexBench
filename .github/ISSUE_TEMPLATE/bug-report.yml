name: Bug Report
description: Report a bug in the scoring harness, CLI, or model clients
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

        **Note:** For security vulnerabilities, use [private vulnerability reporting](https://github.com/BE-LexBench/be-lexbench/security/advisories/new) instead.

  - type: input
    id: be-lexbench-version
    attributes:
      label: be-lexbench version
      description: Output of `pip show be-lexbench | grep Version` or the git commit hash
      placeholder: e.g. 1.0.0 or abc1234
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: e.g. 3.11.4
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      options:
        - Scorer (harness/scorers.py)
        - Judge (harness/judge.py)
        - Model client (harness/models.py)
        - CLI / run_eval (harness/run_eval.py)
        - Statistics (harness/stats.py)
        - CI / packaging
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal command or code snippet that triggers the bug.
      render: bash
    validations:
      required: true

  - type: textarea
    id: actual-output
    attributes:
      label: Actual output / error
      description: Paste the full error message or unexpected output.
      render: text
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else that might help — OS, model kind, judge config, etc.
